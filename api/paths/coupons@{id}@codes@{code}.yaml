delete:
  summary: Remove a coupon code
  description: |
    Remove a single code from a coupon. Removed codes are hidden from all listing and
    retrieval endpoints. Returns a 404 response when the code does not exist or has
    already been removed.
  operationId: removeCouponCode
  tags:
    - Coupons
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
        description: ID of the coupon
    - name: code
      in: path
      required: true
      schema:
        type: string
        example: SUMMER2026
        description: The coupon code to remove
  responses:
    '204':
      description: No content.
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyAttempts.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
