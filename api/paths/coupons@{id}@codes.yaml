get:
  summary: List coupon codes
  description: |
    Retrieves a paginated list of all codes belonging to a coupon. Archived codes are
    not returned. Returns a 404 response when the coupon is archived or does not exist.
  operationId: listCouponCodes
  tags:
    - Coupons
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
        description: ID of the coupon
    - $ref: ../components/parameters/page.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            required:
              - data
              - pagination
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/CouponCode.yaml
              pagination:
                allOf:
                  - $ref: ../components/schemas/Pagination.yaml
                  - properties:
                      nextPageUrl:
                        example: https://api.letsbook.app/v1/coupons/8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278/codes?page=2
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '429':
      $ref: ../components/responses/TooManyAttempts.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml

post:
  summary: Add coupon codes
  description: |
    Add one or more manually specified codes to a coupon. All codes must be unique within
    the coupon; the request fails if any of the provided codes already exist. Returns a
    404 response when the coupon is archived or does not exist.
  operationId: addCouponCodes
  tags:
    - Coupons
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
        description: ID of the coupon
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/forms/AddCouponCodes.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            required:
              - data
              - pagination
            properties:
              data:
                type: array
                description: The codes that were just added.
                items:
                  $ref: ../components/schemas/CouponCode.yaml
              pagination:
                allOf:
                  - $ref: ../components/schemas/Pagination.yaml
                  - properties:
                      nextPageUrl:
                        example: https://api.letsbook.app/v1/coupons/8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278/codes?page=2
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            required:
              - errors
            properties:
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
                example:
                  codes:
                    - The code "SUMMER2026" is already in use.

    '429':
      $ref: ../components/responses/TooManyAttempts.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
