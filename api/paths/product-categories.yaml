get:
  summary: List all product categories
  description: Returns a list of all product categories. The response is not paginated.
  operationId: listProductCategories
  tags:
    - Products
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/ProductCategory.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '429':
      $ref: ../components/responses/TooManyAttempts.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
