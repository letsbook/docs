post:
  summary: Create a free time coupon
  description: |
    Creates a new coupon that grants a fixed amount of free rental time.
  operationId: createFreeTimeCoupon
  tags:
    - Coupons
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/forms/FreeTimeCouponCreate.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/FreeTimeCoupon.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            required:
              - errors
            properties:
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
                example:
                  name:
                    - The name field is required.
                  freeTime:
                    - The freeTime field is required.

    '429':
      $ref: ../components/responses/TooManyAttempts.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
