description: Fields shared by all coupon types.
required:
  - id
  - name
  - codesCount
  - totalUsages
  - maxUsages
  - createdAt
properties:
  id:
    type: string
    format: uuid
    description: Unique identifier of the coupon
    example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
  name:
    type: string
    description: Name of the coupon
    example: Summer Sale
  codesCount:
    type: integer
    description: Number of codes associated with this coupon.
    example: 100
  totalUsages:
    type: integer
    description: Total number of times codes of this coupon have been used.
    example: 42
  maxUsages:
    type: integer
    description: Maximum number of times codes of this coupon can be used in total.
    example: 500
  createdAt:
    type: string
    format: date-time
    description: Timestamp of when the coupon was created in ISO 8601 format
    example: 2026-04-20T12:00:00+00:00
