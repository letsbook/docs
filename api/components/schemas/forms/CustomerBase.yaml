type: object
properties:
  customerTypeId:
    type: string
    format: uuid
    description: Customer type ID
    example: a6fe15b1-8131-4f48-8082-311e0369f599
  givenName:
    type: string
    description: First name of the customer
    example: John
  familyName:
    type: string
    description: Last name of the customer
    example: Doe
  emailAddress:
    type: string
    description: Email address of the customer
    format: email
    example: john.doe@example.com
  phoneNumber:
    type: string
    description: Phone number of the customer in E.164 format
    example: '+49123456789'
  preferredLocale:
    type: string
    description: Preferred locale of the customer in `language_COUNTRY` format.
    example: sv_SE
  password:
    type: string
    deprecated: true
    description: |
      This property is deprecated and will be ignored. Passwords can no longer
      be set through the API. When creating a customer with `notifyCustomer`
      set to true, a welcome email with a password reset link is sent instead.
    example: correcthorsebatterystaple
