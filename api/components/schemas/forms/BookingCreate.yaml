type: object
description: Parameters for creating a new booking.
required:
  - customerId
  - dockId
  - boatModelId
  - pickup
  - return
allOf:
  - $ref: ./BookingBase.yaml
  - type: object
    properties:
      notifyCustomer:
        type: boolean
        default: false
        description: |
          If set to true, the customer will receive a booking
          confirmation email.
        example: false
      includePaymentLink:
        default: true
        type: boolean
        description: |
          Whether or not the booking confirmation email should contain a
          payment request link. Only applicable if notifyCustomer is true.
        example: true
      confirmed:
        type: boolean
        description: |
          If set to true, the booking will be marked as confirmed. If set to false
          or omitted, the booking will be created as a draft. Use the
          [confirm endpoint](/api/#operation/confirmBooking) to confirm a draft
          booking later.
        default: false
        example: true
      paid:
        deprecated: true
        type: boolean
        description: |
          **Deprecated.** Use `confirmed` instead.

          If set to true, the booking will be marked as confirmed. Previously, this
          property would add a cash payment equal to the unpaid costs. This behavior
          has been removed in favor of explicit confirmation without automatic
          payment creation.
        default: true
        example: true
      partnerCode:
        type: string
        description: Optional partner code to associate with the booking.
        pattern: "^[a-z0-9\\-_]{1,32}$"
        example: hotel-xyz
