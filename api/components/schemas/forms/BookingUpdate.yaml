type: object
description: Parameters for updating an existing booking.
allOf:
  - $ref: ./BookingBase.yaml
  - type: object
    properties:
      notifyCustomer:
        type: boolean
        default: false
        description: |
          If set to true, the customer will receive a booking updated email.
        example: false
      partnerCode:
        type:
          - string
          - 'null'
        description: |
          Partner code to associate with the booking. Send null to clear
          an existing partner code. Omit the field entirely to leave it
          unchanged.
        pattern: "^[a-z0-9\\-_]{1,32}$"
        example: hotel-xyz
