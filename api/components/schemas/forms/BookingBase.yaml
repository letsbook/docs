description: Booking
properties:
  customerId:
    type: string
    format: uuid
    example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
    description: ID of the customer
  dockId:
    type: string
    format: uuid
    example: 3462e0cd-a446-49b7-bf18-b5e1c78098ca
    description: ID of the dock
  boatModelId:
    type: string
    format: uuid
    example: 3462e0cd-a446-49b7-bf18-b5e1c78098ca
    description: ID of the boat model
  pickup:
    type: string
    format: date-time
    example: 2022-01-01T00:00:00Z
    description: Pickup date and time in ISO 8601 format
  return:
    type: string
    format: date-time
    example: 2022-01-03T00:00:00Z
    description: Return date and time in ISO 8601 format
  boats:
    type: integer
    example: 1
    description: Number of boats booked
    default: 1
  passengers:
    type: integer
    example: 1
    description: Number of passengers including the customer who booked the boat
    default: 1
  confirmed:
    type: boolean
    description: |
      If set to true, the booking will be marked as confirmed. If set to false
      or omitted, the booking will be created as a draft. Use the
      [confirm endpoint](/api/#operation/confirmBooking) to confirm a draft
      booking later.
    default: false
    example: true
  paid:
    deprecated: true
    type: boolean
    description: |
      **Deprecated.** Use `confirmed` instead.

      If set to true, the booking will be marked as confirmed. Previously, this
      property would add a cash payment equal to the unpaid costs. This behavior
      has been removed in favor of explicit confirmation without automatic
      payment creation.
    default: true
    example: true
  createdAt:
    type: string
    format: date-time
    example: 2022-01-01T00:00:00Z
    description: The time this booking was first created in ISO 8601 format
