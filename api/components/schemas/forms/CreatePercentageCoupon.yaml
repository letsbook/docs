type: object
description: Parameters for creating a percentage coupon.
required:
  - name
  - percentage
properties:
  name:
    type: string
    maxLength: 255
    description: Name of the coupon
    example: Summer Sale
  percentage:
    type: number
    minimum: 0.01
    maximum: 100
    description: |
      Discount percentage applied when a code of this coupon is used. Must be between `0.01`
      and `100`.
    example: 10
