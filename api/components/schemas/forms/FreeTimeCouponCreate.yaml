type: object
description: Parameters for creating a free time coupon.
required:
  - name
  - freeTime
properties:
  name:
    type: string
    maxLength: 255
    description: Name of the coupon
    example: 2 hours free
  freeTime:
    type: string
    pattern: '^[0-9]+(\.[0-9]+)?[mhd]$'
    description: |
      Duration of free time granted when a code of this coupon is used, expressed as a
      number followed by a single-character unit: `m` (minutes), `h` (hours), or `d`
      (days). Examples: `"30m"`, `"2h"`, `"1.5h"`, `"4d"`.
    example: 2h
