description: A coupon that discounts a fixed amount off the booking total.
required:
  - id
  - name
  - type
  - amount
  - codesCount
  - totalUsages
  - maxUsages
  - createdAt
properties:
  id:
    type: string
    format: uuid
    description: Unique identifier of the coupon
    example: 8d159bbe-f6bc-4ddd-8c9a-6091d7ebd278
  name:
    type: string
    description: Name of the coupon
    example: Welcome gift
  type:
    type: string
    enum:
      - fixedAmount
    description: The coupon type discriminator.
    example: fixedAmount
  amount:
    type: integer
    description: |
      Discount amount applied when a code of this coupon is used, in cents of the
      organisation's default currency.
    example: 2500
  codesCount:
    type: integer
    description: Number of codes associated with this coupon.
    example: 50
  totalUsages:
    type: integer
    description: Total number of times codes of this coupon have been used.
    example: 17
  maxUsages:
    type:
      - integer
      - 'null'
    description: |
      Maximum number of times codes of this coupon can be used in total. Null when there
      is no overall limit.
    example: null
  createdAt:
    type: string
    format: date-time
    description: Timestamp of when the coupon was created in ISO 8601 format
    example: 2026-04-20T12:00:00+00:00
