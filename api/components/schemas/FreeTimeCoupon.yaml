description: A coupon that grants a fixed amount of free rental time.
allOf:
  - $ref: ./CouponBase.yaml
  - type: object
    required:
      - type
      - freeTime
    properties:
      type:
        type: string
        enum:
          - freeTime
        description: The coupon type discriminator.
        example: freeTime
      freeTime:
        type: string
        pattern: '^[0-9]+(\.[0-9]+)?[mhd]$'
        description: |
          Duration of free time granted when a code of this coupon is used, expressed as a
          number followed by a single-character unit: `m` (minutes), `h` (hours), or `d`
          (days). Examples: `"30m"`, `"2h"`, `"1.5h"`, `"4d"`.
        example: 2h
