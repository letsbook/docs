type: object
description: Organisation the user has access to
required:
  - id
  - name
  - slug
properties:
  id:
    type: string
    format: uuid
    example: '1e48f449-d111-4323-87c5-eeab2d2ceb91'
    description: The ID of the organisation
  name:
    type: string
    example: 'My organisation'
    description: The name of the organisation
  slug:
    type: string
    example: 'my-organisation'
    description: The slug which is used in the customer facing URLs
